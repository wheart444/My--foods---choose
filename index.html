<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختيار المنتجات /اسير الذكريات (hammody hamoody)</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #8BC34A;
            --accent: #2196F3;
            --admin: #e74c3c;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            padding-bottom: 230px;
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        h2 { margin: 0; font-size: 13px; color: var(--primary); flex: 1; }
        .admin-toggle { background: #eee; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .admin-active { background: var(--admin); color: white; }

        .controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input[type="text"], select { padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; width: 100%; box-sizing: border-box; outline: none; }
        
        .list-container { display: flex; flex-direction: column; gap: 8px; }
        
        .card {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            border: 1px solid #eee;
            position: relative;
        }
        .item-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .img-container {
            width: 50px; height: 50px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            background: #f9f9f9; border-radius: 8px; overflow: hidden; border: 1px solid #f0f0f0;
        }
        .img-container img { width: 100%; height: 100%; object-fit: contain; }
        
        .item-names h4 { margin: 0; font-size: 14px; color: #2c3e50; direction: ltr; text-align: right; }
        .item-names h5 { margin: 2px 0; font-size: 13px; color: #d35400; }
        .item-names p { font-size: 9px; color: #95a5a6; margin: 0; }

        .edit-icon {
            display: none; position: absolute; top: 2px; left: 2px; background: var(--admin);
            color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; border: none; cursor: pointer; z-index: 10;
        }

        .qty-controls { display: flex; align-items: center; gap: 3px; }
        .qty-btn { color: white; border: none; border-radius: 5px; width: 30px; height: 32px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .minus { background-color: #f44336; }
        .plus { background-color: var(--secondary); }
        .plus10 { background-color: var(--accent); width: 38px; font-size: 12px; }
        .qty-input { width: 32px; text-align: center; font-size: 15px; border: 1px solid #ddd; border-radius: 5px; padding: 4px 0; font-weight: bold; }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 15px; z-index: 1000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0;
        }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: bold; color: white; cursor: pointer; }
        .btn-copy { background-color: #FF9800; }
        .btn-edit { background-color: #9C27B0; }
        .btn-delete { background-color: #f44336; }
        textarea { width: 100%; height: 60px; border-radius: 10px; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; font-family: monospace; font-size: 13px; direction: ltr; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        .modal-content input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="header-area">
        <h2>اختيار المنتجات /اسير الذكريات (hammody hamoody)</h2>
        <button id="adminBtn" class="admin-toggle" onclick="showLoginModal()">🔐 إدارة</button>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="بحث باسم المنتج..." oninput="filterItems()">
        <select id="machineFilter" onchange="filterItems()">
            <option value="All">جميع الآلات (All Machines)</option>
        </select>
    </div>

    <div class="list-container" id="itemsGrid"></div>

    <div class="bottom-bar">
        <textarea id="resultText" readonly placeholder="القائمة..."></textarea>
        <div class="action-btns">
            <button class="btn btn-copy" onclick="copyList()">نسخ</button>
            <button class="btn btn-edit" id="textEditBtn" onclick="toggleTextEdit()">تعديل</button>
            <button class="btn btn-delete" onclick="clearAll()">تصفير</button>
        </div>
    </div>

    <!-- نافذة تسجيل الدخول -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0; text-align:center;">دخول الإدارة</h3>
            <input type="password" id="adminPassInput" placeholder="أدخل الباسورد الخاص بك">
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:var(--primary); flex:1" onclick="checkAdminPass()">دخول</button>
                <button class="btn" style="background:#95a5a6; flex:1" onclick="closeLoginModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة تعديل المنتج -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0; color:var(--admin)">تعديل المنتج</h3>
            <label>الاسم EN:</label><input type="text" id="editEnName">
            <label>الاسم AR:</label><input type="text" id="editArName">
            <label>رفع صورة:</label>
            <input type="file" id="fileInput" accept="image/*" onchange="previewFile()">
            <label>أو رابط صورة:</label>
            <input type="text" id="editImgUrl">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn" style="background:var(--primary); flex:1" onclick="saveEdit()">حفظ</button>
                <button class="btn" style="background:#95a5a6; flex:1" onclick="closeEditModal()">إلغاء</button>
            </div>
        </div>
    </div>

        function init() {
            const saved = localStorage.getItem('ASIR_FINALE_DB');
            if (saved) {
                items = JSON.parse(saved);
            } else {
                inventoryData.forEach((cat, cIdx) => {
                    cat.items.forEach((it, iIdx) => {
                        items.push({
                            id: 'it_' + cIdx + '_' + iIdx,
                            machine: cat.machine,
                            arMachine: cat.arMachine,
                            name: it.name,
                            arName: it.arName,
                            qty: 0,
                            img: ""
                        });
                    });
                });
                saveData();
            }

            const filter = document.getElementById('machineFilter');
            const uniqueMachines = [...new Set(items.map(i => i.machine))];
            uniqueMachines.forEach(m => {
                const found = items.find(i => i.machine === m);
                filter.innerHTML += `<option value="${m}">${found.arMachine} - ${m}</option>`;
            });
            render();
        }

        function saveData() { localStorage.setItem('ASIR_FINALE_DB', JSON.stringify(items)); }

        function render(data = items) {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                let imgUrl = item.img || `https://static.wikia.nocookie.net/hayday/images/archive/temp/temp/${item.name.replace(/\s+/g, '_')}.png`;
                card.innerHTML = `
                    <button class="edit-icon" style="display:${isAdmin?'block':'none'}" onclick="openEdit('${item.id}')">✎</button>
                    <div class="item-info">
                        <div class="img-container">
                            <img src="${imgUrl}" onerror="this.src='https://placehold.co/40x40?text=📦'">
                        </div>
                        <div class="item-names">
                            <h4>${item.name}</h4>
                            <h5>${item.arName}</h5>
                            <p>${item.arMachine} - ${item.machine}</p>
                        </div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn minus" onclick="updateQty('${item.id}', -1)">-</button>
                        <input type="number" id="q${item.id}" class="qty-input" value="${item.qty || ''}" oninput="manualQty('${item.id}')">
                        <button class="qty-btn plus" onclick="updateQty('${item.id}', 1)">+</button>
                        <button class="qty-btn plus10" onclick="updateQty('${item.id}', 10)">+10</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Login Functions
        function showLoginModal() { 
            if(isAdmin) { toggleAdmin(); return; }
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('adminPassInput').focus();
        }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; document.getElementById('adminPassInput').value = ''; }
        function checkAdminPass() {
            const pass = document.getElementById('adminPassInput').value;
            if (pass === "572407") {
                isAdmin = true; toggleAdminUI(); closeLoginModal();
            } else { alert("الباسورد غير صحيح!"); }
        }
        function toggleAdmin() { isAdmin = !isAdmin; toggleAdminUI(); }
        function toggleAdminUI() {
            const btn = document.getElementById('adminBtn');
            btn.className = isAdmin ? 'admin-toggle admin-active' : 'admin-toggle';
            btn.innerText = isAdmin ? '🔓 وضع التعديل' : '🔐 إدارة';
            render();
        }

        // Edit Functions
        function openEdit(id) {
            activeEditId = id;
            const item = items.find(i => i.id === id);
            document.getElementById('editEnName').value = item.name;
            document.getElementById('editArName').value = item.arName;
            document.getElementById('editImgUrl').value = (item.img && !item.img.startsWith('data:')) ? item.img : '';
            document.getElementById('editModal').style.display = 'flex';
        }
        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; uploadedImgBase64 = ""; }
        function previewFile() {
            const file = document.querySelector('#fileInput').files[0];
            const reader = new FileReader();
            reader.onloadend = () => { uploadedImgBase64 = reader.result; };
            if (file) reader.readAsDataURL(file);
        }
        function saveEdit() {
            const item = items.find(i => i.id === activeEditId);
            item.name = document.getElementById('editEnName').value;
            item.arName = document.getElementById('editArName').value;
            item.img = uploadedImgBase64 || document.getElementById('editImgUrl').value;
            saveData(); closeEditModal(); render();
        }

        function updateQty(id, val) {
            const item = items.find(i => i.id === id);
            item.qty = (item.qty || 0) + val;
            if (item.qty < 0) item.qty = 0;
            document.getElementById('q'+id).value = item.qty || '';
            updateList();
        }
        function manualQty(id) {
            const item = items.find(i => i.id === id);
            item.qty = parseInt(document.getElementById('q'+id).value) || 0;
            updateList();
        }
        function updateList() {
            const res = items.filter(i => i.qty > 0).map(i => `${i.name}=${i.qty}`).join('\n');
            document.getElementById('resultText').value = res;
        }
        function filterItems() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const m = document.getElementById('machineFilter').value;
            const filtered = items.filter(i => (i.name.toLowerCase().includes(s) || i.arName.includes(s)) && (m === 'All' || i.machine === m));
            render(filtered);
        }
        function copyList() {
            const t = document.getElementById('resultText'); if (!t.value) return;
            t.select(); document.execCommand('copy'); alert("تم النسخ!");
        }
        function toggleTextEdit() {
            const t = document.getElementById('resultText');
            if (t.hasAttribute('readonly')) { t.removeAttribute('readonly'); t.focus(); document.getElementById('textEditBtn').innerText = "حفظ"; }
            else { t.setAttribute('readonly', 'true'); document.getElementById('textEditBtn').innerText = "تعديل"; }
        }
        function clearAll() { if (confirm("تصفير الكل؟")) { items.forEach(i => i.qty = 0); render(); updateList(); } }

        window.onload = init;
    </script>
