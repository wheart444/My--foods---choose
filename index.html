<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختيار المنتجات /اسير الذكريات (hammody hamoody)</title>
    <style>
        :root {
            --primary: #4CAF50; --secondary: #8BC34A; --accent: #2196F3;
            --admin: #e74c3c; --bg: #f4f7f6; --card-bg: #ffffff; --text: #333;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 230px; }
        .header-area { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        h2 { margin: 0; font-size: 13px; color: var(--primary); }
        .admin-toggle { background: #eee; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .admin-active { background: var(--admin); color: white; }
        .admin-tools { display: none; margin-top: 10px; padding: 10px; border-top: 2px dashed #feb2b2; background: #fff5f5; border-radius: 8px; text-align: center; }
        .controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        .list-container { display: flex; flex-direction: column; gap: 8px; }
        .card { background: var(--card-bg); padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; border: 1px solid #eee; transition: 0.2s; }
        .admin-mode-active .card { border: 2px solid var(--admin); cursor: pointer; }
        .item-info { display: flex; align-items: center; gap: 10px; flex: 1; } 
        .img-container { width: 55px; height: 55px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #f9f9f9; border-radius: 10px; overflow: hidden; }
        .img-container img { width: 90%; height: 90%; object-fit: contain; }
        .item-names h4 { margin: 0; font-size: 14px; color: #2c3e50; direction: ltr; text-align: right; }
        .item-names h5 { margin: 2px 0; font-size: 13px; color: #d35400; }
        .item-names p { font-size: 9px; color: #95a5a6; margin: 0; }
        .qty-controls { display: flex; align-items: center; gap: 3px; z-index: 5; }
        .qty-btn { color: white; border: none; border-radius: 6px; width: 32px; height: 35px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .minus { background-color: #f44336; } .plus { background-color: var(--secondary); } .plus10 { background-color: var(--accent); width: 40px; font-size: 12px; }
        .qty-input { width: 35px; text-align: center; font-size: 16px; border: 1px solid #ddd; border-radius: 6px; font-weight: bold; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 15px; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: bold; color: white; cursor: pointer; }
        .btn-copy { background-color: #FF9800; } .btn-edit { background-color: #9C27B0; } .btn-delete { background-color: #f44336; }
        textarea { width: 100%; height: 65px; border-radius: 10px; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; font-family: monospace; font-size: 14px; direction: ltr; }
        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
    </style>
</head>
<body id="mainBody">

    <div class="header-area">
        <div class="top-row">
            <h2>اختيار المنتجات /اسير الذكريات (hammody hamoody)</h2>
            <button id="adminBtn" class="admin-toggle" onclick="showLoginModal()">🔐 إدارة</button>
        </div>
        <div id="adminTools" class="admin-tools">
            <button class="btn" style="background: #2d3748; width: 100%;" onclick="exportUpdatedFile()">📥 حفظ للجميع (تحميل الملف)</button>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="بحث باسم المنتج..." oninput="filterItems()">
        <select id="machineFilter" onchange="filterItems()">
            <option value="All">جميع الآلات (All Machines)</option>
        </select>
    </div>

    <div class="list-container" id="itemsGrid"></div>

    <div class="bottom-bar">
        <textarea id="resultText" readonly placeholder="القائمة تظهر هنا..."></textarea>
        <div class="action-btns">
            <button class="btn btn-copy" onclick="copyList()">نسخ</button>
            <button class="btn btn-edit" id="textEditBtn" onclick="toggleTextEdit()">تعديل</button>
            <button class="btn btn-delete" onclick="clearAll()">تصفير</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0; text-align:center;">إدخال رمز الحماية</h3>
            <input type="tel" id="adminPassInput" placeholder="الباسورد..." style="text-align: center;">
            <button class="btn" style="background:var(--primary)" onclick="checkAdminPass()">دخول</button>
            <button class="btn" style="background:#95a5a6" onclick="closeLoginModal()">إلغاء</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0; color:var(--admin)">تعديل بيانات المنتج</h3>
            <label>EN:</label><input type="text" id="editEnName">
            <label>AR:</label><input type="text" id="editArName">
            <label>صورة:</label><input type="file" id="fileInput" accept="image/*" onchange="previewFile()">
            <label>رابط:</label><input type="text" id="editImgUrl">
            <button class="btn" style="background:var(--primary)" onclick="saveEdit()">حفظ</button>
            <button class="btn" style="background:#ccc" onclick="closeEditModal()">إلغاء</button>
        </div>
    </div>

        ];

        let isAdmin = false, activeEditId = null, uploadedImgBase64 = "", items = [];

        function init() {
            // تحميل البيانات المحقونة أو المخزنة أو الافتراضية
            if (window.CUSTOM_DATA && window.CUSTOM_DATA.length > 0) {
                items = window.CUSTOM_DATA;
            } else {
                const saved = localStorage.getItem('ASIR_V6_DB');
                if (saved) { items = JSON.parse(saved); } else {
                    fullInventory.forEach((cat, cIdx) => {
                        cat.items.forEach((it, iIdx) => {
                            items.push({ id: 'it_'+cIdx+'_'+iIdx, machine: cat.machine, arMachine: cat.arMachine, name: it.n, arName: it.a, qty: 0, img: "" });
                        });
                    });
                }
            }
            saveData();
            
            // تعبئة قائمة الآلات
            const filter = document.getElementById('machineFilter');
            const uniqueMachines = [...new Set(items.map(i => i.machine))];
            uniqueMachines.forEach(m => {
                const found = items.find(i => i.machine === m);
                filter.innerHTML += `<option value="${m}">${found.arMachine} - ${m}</option>`;
            });
            render();
        }

        function saveData() { localStorage.setItem('ASIR_V6_DB', JSON.stringify(items)); }

        function render(dataToRender = items) {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';
            document.getElementById('mainBody').className = isAdmin ? 'admin-mode-active' : '';

            // تطبيق فلترة الآلة والبحث في نفس الوقت لضمان دقة العرض
            const selectedMachine = document.getElementById('machineFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase();

            const finalData = items.filter(i => {
                const matchMachine = selectedMachine === 'All' || i.machine === selectedMachine;
                const matchSearch = i.name.toLowerCase().includes(searchText) || i.arName.includes(searchText);
                return matchMachine && matchSearch;
            });

            finalData.forEach(item => {
                let imgUrl = item.img || `https://static.wikia.nocookie.net/hayday/images/archive/temp/temp/${item.name.replace(/\s+/g, '_')}.png`;
                const card = document.createElement('div'); card.className = 'card';
                card.onclick = () => { if(isAdmin) openEdit(item.id); };
                card.innerHTML = `
                    <div class="item-info">
                        <div class="img-container"><img src="${imgUrl}" onerror="this.src='https://placehold.co/40x40?text=📦'"></div>
                        <div class="item-names"><h4>${item.name}</h4><h5>${item.arName}</h5><p>${item.arMachine}</p></div>
                    </div>
                    <div class="qty-controls" onclick="event.stopPropagation()">
                        <button class="qty-btn minus" onclick="updateQty('${item.id}', -1)">-</button>
                        <input type="number" id="q${item.id}" class="qty-input" value="${item.qty || ''}" oninput="manualQty('${item.id}')">
                        <button class="qty-btn plus" onclick="updateQty('${item.id}', 1)">+</button>
                        <button class="qty-btn plus10" onclick="updateQty('${item.id}', 10)">+10</button>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function filterItems() { render(); } // استدعاء render سيتكفل بالفلترة بناء على الاختيار

        function showLoginModal() { 
            if(isAdmin) { isAdmin = false; toggleAdminUI(); return; }
            document.getElementById('loginModal').style.display = 'flex'; document.getElementById('adminPassInput').value=''; document.getElementById('adminPassInput').focus();
        }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        function checkAdminPass() {
            if (document.getElementById('adminPassInput').value === "572407") { isAdmin = true; toggleAdminUI(); closeLoginModal(); } else { alert("خطأ!"); }
        }
        function toggleAdminUI() {
            const btn = document.getElementById('adminBtn'); btn.className = isAdmin ? 'admin-toggle admin-active' : 'admin-toggle';
            btn.innerText = isAdmin ? '🔓 خروج' : '🔐 إدارة'; document.getElementById('adminTools').style.display = isAdmin ? 'block' : 'none'; render();
        }

        function openEdit(id) {
            activeEditId = id; const item = items.find(i => i.id === id);
            document.getElementById('editEnName').value = item.name; document.getElementById('editArName').value = item.arName;
            document.getElementById('editImgUrl').value = (item.img && !item.img.startsWith('data:')) ? item.img : '';
            document.getElementById('editModal').style.display = 'flex';
        }
        function previewFile() {
            const file = document.querySelector('#fileInput').files[0]; const reader = new FileReader();
            reader.onloadend = () => { uploadedImgBase64 = reader.result; }; if (file) reader.readAsDataURL(file);
        }
        function saveEdit() {
            const item = items.find(i => i.id === activeEditId); item.name = document.getElementById('editEnName').value;
            item.arName = document.getElementById('editArName').value; item.img = uploadedImgBase64 || document.getElementById('editImgUrl').value;
            saveData(); closeEditModal(); render();
        }
        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; uploadedImgBase64 = ""; }

        function exportUpdatedFile() {
            isAdmin = false; toggleAdminUI(); // إغلاق الإدارة لضمان أمان النسخة المستخرجة
            let html = document.documentElement.outerHTML;
            // حقن البيانات في المصفوفة لتعمل عند الجميع
            let scriptToInject = `<script>window.CUSTOM_DATA = ${JSON.stringify(items)}; localStorage.setItem('ASIR_V6_DB', JSON.stringify(window.CUSTOM_DATA));<\/script>`;
            let finalHtml = html.replace('</body>', scriptToInject + '</body>');
            const blob = new Blob([finalHtml], {type: 'text/html'}); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'index.html';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function updateQty(id, v) { const i = items.find(x => x.id === id); i.qty = Math.max(0, (i.qty||0)+v); render(); updateList(); }
        function manualQty(id) { const i = items.find(x => x.id === id); i.qty = parseInt(document.getElementById('q'+id).value) || 0; updateList(); }
        function updateList() { document.getElementById('resultText').value = items.filter(i => i.qty > 0).map(i => `${i.name}=${i.qty}`).join('\n'); }
        function copyList() { const t = document.getElementById('resultText'); if(!t.value) return; t.select(); document.execCommand('copy'); alert("تم النسخ!"); }
        function toggleTextEdit() {
            const t = document.getElementById('resultText'); if (t.hasAttribute('readonly')) { t.removeAttribute('readonly'); t.focus(); } else { t.setAttribute('readonly', 'true'); }
        }
        function clearAll() { if(confirm("تصفير؟")){ items.forEach(i=>i.qty=0); render(); updateList(); } }

        window.onload = init;
    </script>
